<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Анкета клиента</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f8e8ee 0%, #fce4ec 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 36px 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(200, 100, 130, 0.12);
    }

    .lang-switcher {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .lang-btn {
      padding: 6px 14px;
      border: 1.5px solid #f0d6e0;
      border-radius: 20px;
      background: #fdfafa;
      color: #aaa;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn.active {
      border-color: #e91e63;
      background: #fce4ec;
      color: #c2185b;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 {
      font-size: 22px;
      color: #c2185b;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .logo p {
      color: #999;
      font-size: 13px;
      margin-top: 4px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #e91e63;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 24px 0 12px;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #f0d6e0;
      border-radius: 12px;
      font-size: 15px;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
      background: #fdfafa;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #e91e63;
      background: white;
    }

    textarea { resize: vertical; min-height: 80px; }

    .stars {
      display: flex;
      flex-direction: row-reverse;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }

    .stars input { display: none; }

    .stars label {
      font-size: 32px;
      color: #ddd;
      cursor: pointer;
      transition: color 0.15s;
      margin: 0;
      padding: 0;
      width: auto;
    }

    .stars label:hover,
    .stars label:hover ~ label,
    .stars input:checked ~ label {
      color: #f5a623;
    }

    .toggle-group { display: flex; gap: 10px; }
    .toggle-group input { display: none; }

    .toggle-group label {
      flex: 1;
      text-align: center;
      padding: 10px;
      border: 1.5px solid #f0d6e0;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      color: #888;
      background: #fdfafa;
      transition: all 0.2s;
      margin: 0;
    }

    .toggle-group input:checked + label {
      border-color: #e91e63;
      background: #fce4ec;
      color: #c2185b;
      font-weight: 600;
    }

    /* Чекбоксы */
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1.5px solid #f0d6e0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      background: #fdfafa;
    }

    .checkbox-item:hover {
      border-color: #e91e63;
      background: #fff5f8;
    }

    .checkbox-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      min-width: 18px;
      accent-color: #e91e63;
      cursor: pointer;
      padding: 0;
      border: none;
      background: none;
    }

    .checkbox-item span {
      font-size: 14px;
      color: #555;
      line-height: 1.3;
    }

    .checkbox-item:has(input:checked) {
      border-color: #e91e63;
      background: #fce4ec;
    }

    .checkbox-item:has(input:checked) span {
      color: #c2185b;
      font-weight: 500;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #e91e63, #c2185b);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.92; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .success {
      display: none;
      text-align: center;
      padding: 20px 0;
    }

    .success .icon { font-size: 56px; margin-bottom: 12px; }
    .success h2 { color: #c2185b; font-size: 20px; margin-bottom: 8px; }
    .success p { color: #999; font-size: 14px; }

    .divider { height: 1px; background: #f0d6e0; margin: 8px 0; }
  </style>
</head>
<body>
  <div class="card">

    <div class="lang-switcher">
      <button type="button" class="lang-btn" onclick="setLang('uz', this)">🇺🇿 UZ</button>
      <button type="button" class="lang-btn active" onclick="setLang('ru', this)">🇷🇺 RU</button>
      <button type="button" class="lang-btn" onclick="setLang('en', this)">🇬🇧 EN</button>
    </div>

    <div class="logo">
      <h1>💅 Carbonado</h1>
      <p class="t" data-key="subtitle"></p>
    </div>

    <form id="form">

      <div class="section-title t" data-key="section1"></div>

      <div class="field">
        <label class="t" data-key="first_name"></label>
        <input type="text" name="first_name" class="t-ph" data-key="ph_first_name" required />
      </div>
      <div class="field">
        <label class="t" data-key="last_name"></label>
        <input type="text" name="last_name" class="t-ph" data-key="ph_last_name" required />
      </div>
      <div class="field">
        <label class="t" data-key="phone"></label>
        <input type="tel" name="phone" placeholder="+998 90 123 45 67" required />
      </div>
      <div class="field">
        <label class="t" data-key="master"></label>
        <input type="text" name="master" class="t-ph" data-key="ph_master" required />
      </div>
      <div class="field">
        <label class="t" data-key="amount"></label>
        <input type="text" name="amount" class="t-ph" data-key="ph_amount" required />
      </div>

      <div class="divider"></div>
      <div class="section-title t" data-key="section2"></div>

      <div class="field">
        <label class="t" data-key="service"></label>
        <select name="service" required>
          <option value="" disabled selected class="t" data-key="select_service"></option>
          <option class="t" data-key="svc1"></option>
          <option class="t" data-key="svc2"></option>
          <option class="t" data-key="svc3"></option>
          <option class="t" data-key="svc4"></option>
          <option class="t" data-key="svc5"></option>
          <option class="t" data-key="svc6"></option>
        </select>
      </div>

      <div class="field">
        <label class="t" data-key="visit_type"></label>
        <div class="toggle-group">
          <input type="radio" name="visit_type" id="first" value="" required />
          <label for="first" class="t" data-key="first_visit"></label>
          <input type="radio" name="visit_type" id="repeat" value="" />
          <label for="repeat" class="t" data-key="repeat_visit"></label>
        </div>
      </div>

      <div class="field">
        <label class="t" data-key="source"></label>
        <select name="source" required>
          <option value="" disabled selected class="t" data-key="select_source"></option>
          <option class="t" data-key="src1"></option>
          <option class="t" data-key="src2"></option>
          <option class="t" data-key="src3"></option>
          <option class="t" data-key="src4"></option>
          <option class="t" data-key="src5"></option>
          <option class="t" data-key="src6"></option>
        </select>
      </div>

      <!-- НОВЫЙ ВОПРОС 1: Какой мастер -->
      <div class="field">
        <label class="t" data-key="fav_master"></label>
        <input type="text" name="fav_master" class="t-ph" data-key="ph_fav_master" />
      </div>

      <div class="divider"></div>
      <div class="section-title t" data-key="section3"></div>

      <div class="field">
        <label class="t" data-key="rating"></label>
        <div class="stars">
          <input type="radio" name="rating" id="s5" value="5" required />
          <label for="s5">★</label>
          <input type="radio" name="rating" id="s4" value="4" />
          <label for="s4">★</label>
          <input type="radio" name="rating" id="s3" value="3" />
          <label for="s3">★</label>
          <input type="radio" name="rating" id="s2" value="2" />
          <label for="s2">★</label>
          <input type="radio" name="rating" id="s1" value="1" />
          <label for="s1">★</label>
        </div>
      </div>

      <div class="field">
        <label class="t" data-key="satisfied"></label>
        <div class="toggle-group">
          <input type="radio" name="satisfied" id="yes" value="" required />
          <label for="yes" class="t" data-key="yes"></label>
          <input type="radio" name="satisfied" id="no" value="" />
          <label for="no" class="t" data-key="no"></label>
        </div>
      </div>

      <!-- НОВЫЙ ВОПРОС 2: Что нравится -->
      <div class="field">
        <label class="t" data-key="likes_label"></label>
        <div class="checkbox-group" id="likes-group">
          <label class="checkbox-item">
            <input type="checkbox" name="likes" class="like-cb" data-key="like1" />
            <span class="t" data-key="like1"></span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="likes" class="like-cb" data-key="like2" />
            <span class="t" data-key="like2"></span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="likes" class="like-cb" data-key="like3" />
            <span class="t" data-key="like3"></span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="likes" class="like-cb" data-key="like4" />
            <span class="t" data-key="like4"></span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="likes" class="like-cb" data-key="like5" />
            <span class="t" data-key="like5"></span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="likes" class="like-cb" data-key="like6" />
            <span class="t" data-key="like6"></span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="likes" class="like-cb" data-key="like7" />
            <span class="t" data-key="like7"></span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" name="likes" class="like-cb" data-key="like8" />
            <span class="t" data-key="like8"></span>
          </label>
        </div>
      </div>

      <div class="field">
        <label class="t" data-key="comment"></label>
        <textarea name="comment" class="t-ph" data-key="ph_comment"></textarea>
      </div>

      <button type="submit" id="btn" class="t" data-key="submit"></button>
    </form>

    <div class="success" id="success">
      <div class="icon">🌸</div>
      <h2 class="t" data-key="success_title"></h2>
      <p class="t" data-key="success_text"></p>
    </div>
  </div>

  <script>
    const translations = {
      uz: {
        subtitle: "Anketani to'ldiring — 2 daqiqa vaqt oladi",
        section1: "Asosiy ma'lumotlar",
        first_name: "Ism",
        ph_first_name: "Munira",
        last_name: "Familiya",
        ph_last_name: "Ivanova",
        phone: "Telefon raqam",
        master: "Usta ismi",
        ph_master: "Alina",
        amount: "To'lov summasi",
        ph_amount: "150 000",
        section2: "Tashrif haqida",
        service: "Qanday xizmat oldingiz?",
        select_service: "Xizmatni tanlang",
        svc1: "Manikur", svc2: "Pedikur", svc3: "Tirnoq o'stirish",
        svc4: "Gel-lak qoplash", svc5: "Manikur + Pedikur", svc6: "Boshqa",
        visit_type: "Bu sizning birinchi tashrifingizmi?",
        first_visit: "Birinchi marta",
        repeat_visit: "Qayta tashrif",
        source: "Biz haqimizda qayerdan bildingiz?",
        select_source: "Variantni tanlang",
        src1: "Instagram", src2: "Do'st / tanishlar", src3: "Google Maps",
        src4: "Telegram", src5: "Yaqindan o'tib", src6: "Boshqa",
        fav_master: "Салонимизда қайси мастерларга келасиз?",
        ph_fav_master: "Usta ismini yozing...",
        section3: "Fikr-mulohaza",
        rating: "Bahoyingiz",
        satisfied: "Hamma narsa yoqdimi?",
        yes: "👍 Ha", no: "👎 Yo'q",
        likes_label: "Сизга салонда нималар ёқади? (bir nechtasini tanlash mumkin)",
        like1: "Салон атмосфераси",
        like2: "Мастерлар иши яхши ва сифатли",
        like3: "Нархлар қулай",
        like4: "Локация қулай",
        like5: "Салон доим тоза, инструментлар стерил",
        like6: "Мастерлар муомаласи жуда яхши",
        like7: "Иссиқ кофе ва муздек ичимликлар бор",
        like8: "Салон доим тинч, бақир чақир йўқ",
        comment: "Istak yoki izoh",
        ph_comment: "Istaklar bo'lsa yozing...",
        submit: "Anketani yuborish",
        success_title: "Rahmat!",
        success_text: "Anketangiz yuborildi.\nSizni yana ko'rishdan xursandmiz!",
      },
      ru: {
        subtitle: "Заполните анкету — это займёт 2 минуты",
        section1: "Основная информация",
        first_name: "Имя", ph_first_name: "Мунира",
        last_name: "Фамилия", ph_last_name: "Иванова",
        phone: "Номер телефона",
        master: "Имя мастера", ph_master: "Алина",
        amount: "Сумма оплаты", ph_amount: "150 000",
        section2: "О вашем визите",
        service: "Какую услугу получили?",
        select_service: "Выберите услугу",
        svc1: "Маникюр", svc2: "Педикюр", svc3: "Наращивание ногтей",
        svc4: "Покрытие гель-лаком", svc5: "Маникюр + Педикюр", svc6: "Другое",
        visit_type: "Это ваш первый визит?",
        first_visit: "Первый раз", repeat_visit: "Повторный",
        source: "Откуда узнали о нас?",
        select_source: "Выберите вариант",
        src1: "Instagram", src2: "Подруга / знакомые", src3: "Google Карты",
        src4: "Telegram", src5: "Проходил(а) мимо", src6: "Другое",
        fav_master: "К каким мастерам вы приходите в нашем салоне?",
        ph_fav_master: "Напишите имя мастера...",
        section3: "Обратная связь",
        rating: "Ваша оценка",
        satisfied: "Всё ли понравилось?",
        yes: "👍 Да", no: "👎 Нет",
        likes_label: "Что вам нравится в салоне? (можно выбрать несколько)",
        like1: "Атмосфера салона",
        like2: "Работа мастеров качественная",
        like3: "Цены доступные",
        like4: "Удобное расположение",
        like5: "Чистота и стерильность инструментов",
        like6: "Отличное общение мастеров",
        like7: "Есть горячий кофе и холодные напитки",
        like8: "Тихая спокойная обстановка",
        comment: "Пожелания или комментарий",
        ph_comment: "Напишите если есть пожелания...",
        submit: "Отправить анкету",
        success_title: "Спасибо!",
        success_text: "Ваша анкета отправлена.\nРады видеть вас снова!",
      },
      en: {
        subtitle: "Fill out the form — it takes 2 minutes",
        section1: "Basic information",
        first_name: "First name", ph_first_name: "Munira",
        last_name: "Last name", ph_last_name: "Ivanova",
        phone: "Phone number",
        master: "Master's name", ph_master: "Alina",
        amount: "Payment amount", ph_amount: "150 000",
        section2: "About your visit",
        service: "What service did you receive?",
        select_service: "Choose a service",
        svc1: "Manicure", svc2: "Pedicure", svc3: "Nail extensions",
        svc4: "Gel polish", svc5: "Manicure + Pedicure", svc6: "Other",
        visit_type: "Is this your first visit?",
        first_visit: "First time", repeat_visit: "Returning",
        source: "How did you find us?",
        select_source: "Choose an option",
        src1: "Instagram", src2: "Friend / acquaintance", src3: "Google Maps",
        src4: "Telegram", src5: "Walked by", src6: "Other",
        fav_master: "Which masters do you visit in our salon?",
        ph_fav_master: "Write master's name...",
        section3: "Feedback",
        rating: "Your rating",
        satisfied: "Did you enjoy everything?",
        yes: "👍 Yes", no: "👎 No",
        likes_label: "What do you like about our salon? (choose multiple)",
        like1: "Salon atmosphere",
        like2: "High quality work by masters",
        like3: "Affordable prices",
        like4: "Convenient location",
        like5: "Always clean, sterile instruments",
        like6: "Excellent communication from masters",
        like7: "Hot coffee and cold drinks available",
        like8: "Always calm and peaceful",
        comment: "Suggestions or comment",
        ph_comment: "Write if you have any suggestions...",
        submit: "Submit form",
        success_title: "Thank you!",
        success_text: "Your form has been submitted.\nWe look forward to seeing you again!",
      }
    };

    let currentLang = 'ru';

    function setLang(lang, btn) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const t = translations[lang];

      document.querySelectorAll('.t').forEach(el => {
        const key = el.dataset.key;
        if (t[key] !== undefined) el.textContent = t[key];
      });

      document.querySelectorAll('.t-ph').forEach(el => {
        const key = el.dataset.key;
        if (t[key] !== undefined) el.placeholder = t[key];
      });

      // Обновляем value чекбоксов
      document.querySelectorAll('.like-cb').forEach(cb => {
        const key = cb.dataset.key;
        if (t[key]) cb.value = t[key];
      });

      document.getElementById('first').value = t.first_visit;
      document.getElementById('repeat').value = t.repeat_visit;
      document.getElementById('yes').value = t.yes.replace('👍 ', '');
      document.getElementById('no').value = t.no.replace('👎 ', '');
    }

    // Инициализация
    setLang('ru', document.querySelectorAll('.lang-btn')[1]);

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = currentLang === 'uz' ? 'Yuborilmoqda...' : currentLang === 'en' ? 'Sending...' : 'Отправляем...';

      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);

      // Собираем все выбранные чекбоксы
      const likes = formData.getAll('likes');
      data.likes = likes.join(', ');
      data.lang = currentLang.toUpperCase();

      try {
        await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        document.getElementById('form').style.display = 'none';
        document.getElementById('success').style.display = 'block';
      } catch {
        btn.disabled = false;
        btn.textContent = translations[currentLang].submit;
        alert(currentLang === 'uz' ? "Xatolik. Qayta urinib ko'ring." : currentLang === 'en' ? 'Error. Please try again.' : 'Ошибка. Попробуйте ещё раз.');
      }
    });
  </script>
</body>
</html>
