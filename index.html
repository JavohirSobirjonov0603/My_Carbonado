<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Анкета клиента</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f8e8ee 0%, #fce4ec 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 36px 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(200, 100, 130, 0.12);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 {
      font-size: 22px;
      color: #c2185b;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .logo p {
      color: #999;
      font-size: 13px;
      margin-top: 4px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #e91e63;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 24px 0 12px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #f0d6e0;
      border-radius: 12px;
      font-size: 15px;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
      background: #fdfafa;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #e91e63;
      background: white;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Звёздочки */
    .stars {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .stars input {
      display: none;
    }

    .stars label {
      font-size: 32px;
      color: #ddd;
      cursor: pointer;
      transition: color 0.15s;
      margin: 0;
      padding: 0;
      width: auto;
    }

    .stars input:checked ~ label,
    .stars label:hover,
    .stars label:hover ~ label {
      color: #f5a623;
    }

    .stars {
      flex-direction: row-reverse;
      justify-content: flex-end;
    }

    .stars label:hover,
    .stars label:hover ~ label,
    .stars input:checked ~ label {
      color: #f5a623;
    }

    /* Да/Нет кнопки */
    .toggle-group {
      display: flex;
      gap: 10px;
    }

    .toggle-group input {
      display: none;
    }

    .toggle-group label {
      flex: 1;
      text-align: center;
      padding: 10px;
      border: 1.5px solid #f0d6e0;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      color: #888;
      background: #fdfafa;
      transition: all 0.2s;
      margin: 0;
    }

    .toggle-group input:checked + label {
      border-color: #e91e63;
      background: #fce4ec;
      color: #c2185b;
      font-weight: 600;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #e91e63, #c2185b);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.92; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .success {
      display: none;
      text-align: center;
      padding: 20px 0;
    }

    .success .icon { font-size: 56px; margin-bottom: 12px; }
    .success h2 { color: #c2185b; font-size: 20px; margin-bottom: 8px; }
    .success p { color: #999; font-size: 14px; }

    .divider {
      height: 1px;
      background: #f0d6e0;
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>💅 Carbonado</h1>
      <p>Заполните анкету — это займёт 2 минуты</p>
    </div>

    <form id="form">

      <!-- Основная информация -->
      <div class="section-title">Основная информация</div>

      <div class="field">
        <label>Имя</label>
        <input type="text" name="first_name" placeholder="Мунира" required />
      </div>
      <div class="field">
        <label>Фамилия</label>
        <input type="text" name="last_name" placeholder="Иванова" required />
      </div>
      <div class="field">
        <label>Номер телефона</label>
        <input type="tel" name="phone" placeholder="+998 90 123 45 67" required />
      </div>
      <div class="field">
        <label>Имя мастера</label>
        <input type="text" name="master" placeholder="Алина" required />
      </div>
      <div class="field">
        <label>Сумма оплаты</label>
        <input type="text" name="amount" placeholder="150 000" required />
      </div>

      <div class="divider"></div>

      <!-- Полезно для бизнеса -->
      <div class="section-title">О вашем визите</div>

      <div class="field">
        <label>Какую услугу получили?</label>
        <select name="service" required>
          <option value="" disabled selected>Выберите услугу</option>
          <option>Маникюр</option>
          <option>Педикюр</option>
          <option>Наращивание ногтей</option>
          <option>Покрытие гель-лаком</option>
          <option>Маникюр + Педикюр</option>
          <option>Другое</option>
        </select>
      </div>

      <div class="field">
        <label>Это ваш первый визит?</label>
        <div class="toggle-group">
          <input type="radio" name="visit_type" id="first" value="Первый визит" required />
          <label for="first">Первый раз</label>
          <input type="radio" name="visit_type" id="repeat" value="Повторный визит" />
          <label for="repeat">Повторный</label>
        </div>
      </div>

      <div class="field">
        <label>Откуда узнали о нас?</label>
        <select name="source" required>
          <option value="" disabled selected>Выберите вариант</option>
          <option>Instagram</option>
          <option>Подруга / знакомые</option>
          <option>Google Карты</option>
          <option>Telegram</option>
          <option>Проходил(а) мимо</option>
          <option>Другое</option>
        </select>
      </div>

      <div class="divider"></div>

      <!-- Обратная связь -->
      <div class="section-title">Обратная связь</div>

      <div class="field">
        <label>Ваша оценка</label>
        <div class="stars">
          <input type="radio" name="rating" id="s5" value="5" required />
          <label for="s5">★</label>
          <input type="radio" name="rating" id="s4" value="4" />
          <label for="s4">★</label>
          <input type="radio" name="rating" id="s3" value="3" />
          <label for="s3">★</label>
          <input type="radio" name="rating" id="s2" value="2" />
          <label for="s2">★</label>
          <input type="radio" name="rating" id="s1" value="1" />
          <label for="s1">★</label>
        </div>
      </div>

      <div class="field">
        <label>Всё ли понравилось?</label>
        <div class="toggle-group">
          <input type="radio" name="satisfied" id="yes" value="Да" required />
          <label for="yes">👍 Да</label>
          <input type="radio" name="satisfied" id="no" value="Нет" />
          <label for="no">👎 Нет</label>
        </div>
      </div>

      <div class="field">
        <label>Пожелания или комментарий</label>
        <textarea name="comment" placeholder="Напишите если есть пожелания..."></textarea>
      </div>

      <button type="submit" id="btn">Отправить анкету</button>
    </form>

    <div class="success" id="success">
      <div class="icon">🌸</div>
      <h2>Спасибо!</h2>
      <p>Ваша анкета отправлена.<br />Рады видеть вас снова!</p>
    </div>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Отправляем...';

      const data = Object.fromEntries(new FormData(e.target));

      try {
        await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        document.getElementById('form').style.display = 'none';
        document.getElementById('success').style.display = 'block';
      } catch {
        btn.disabled = false;
        btn.textContent = 'Отправить анкету';
        alert('Ошибка. Попробуйте ещё раз.');
      }
    });
  </script>
</body>
</html>
